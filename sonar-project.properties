    "sonar.projectName": "Food Ordering App",
    "sonar.sources": "app,components,hooks,lib,services",
    "sonar.tests": "app,components",
    "sonar.test.inclusions": "**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx",
