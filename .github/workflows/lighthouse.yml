name: Performance & Lighthouse Check

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Start production server
      run: |
        npm run start &
        sleep 3
      timeout-minutes: 5

    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v9
      with:
        uploadArtifacts: true
        temporaryPublicStorage: true
      continue-on-error: true

    - name: Comment PR with Lighthouse results
      if: always()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const lighthouseResults = './.lighthouseci/summary.json';
          
          if (fs.existsSync(lighthouseResults)) {
            const results = JSON.parse(fs.readFileSync(lighthouseResults, 'utf8'));
            const comment = `
## 📊 Lighthouse Audit Results
- **Performance**: ${results['desktop.json']?.scores?.performance || 'N/A'}
- **Accessibility**: ${results['desktop.json']?.scores?.accessibility || 'N/A'}
- **Best Practices**: ${results['desktop.json']?.scores?.['best-practices'] || 'N/A'}
- **SEO**: ${results['desktop.json']?.scores?.seo || 'N/A'}

[Full Report](https://github.com/treosh/lighthouse-ci-action)
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }
      continue-on-error: true
