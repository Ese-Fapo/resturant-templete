---
# GitHub Actions Environment Configuration
# This file documents the recommended environment setup for workflows

# Production Environment Variables
production:
  environment: production
  required_status_checks:
    - "CI Pipeline"
    - "Code Quality & Security"
  required_approvals: 1
  restrict_branches_to: [main]

# Development Environment Variables  
development:
  environment: development
  required_status_checks:
    - "CI Pipeline"
  required_approvals: 0
  restrict_branches_to: [develop]

# Environment Secrets Reference
secrets:
  vercel:
    name: "VERCEL_TOKEN"
    description: "Vercel personal access token for deployments"
    required: false
    
  netlify:
    name: "NETLIFY_TOKEN"
    description: "Netlify personal access token"
    required: false
    netlify_site_id: "NETLIFY_SITE_ID"
    
  sonarcloud:
    name: "SONAR_TOKEN"
    description: "SonarCloud token for code quality analysis"
    required: false
    
  slack:
    name: "SLACK_WEBHOOK_URL"
    description: "Slack incoming webhook for notifications"
    required: false

  github:
    name: "GITHUB_TOKEN"
    description: "Provided automatically by GitHub Actions"
    required: true
    auto_provided: true

# Variables Configuration
variables:
  NODE_VERSION: "20.x"
  NODE_ENV_BUILD: "production"
  NODE_ENV_DEV: "development"
